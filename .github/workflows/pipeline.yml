name: VehicleGuard AI CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-rates-service:
    name: Build & Test rates-service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vehicleguard_test
          POSTGRES_USER: vehicleguard
          POSTGRES_PASSWORD: vehicleguard123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build rates-service
        working-directory: rates-service
        run: mvn clean compile -B

      - name: Run unit tests - rates-service
        working-directory: rates-service
        run: mvn test -B -Dtest="RatesControllerTest,RatesServiceTest"

      - name: Run integration tests - rates-service
        working-directory: rates-service
        run: mvn test -B -Dtest="RatesServiceIntegrationTest"
        env:
          DB_URL: jdbc:postgresql://localhost:5432/vehicleguard_test
          DB_USER: vehicleguard
          DB_PASSWORD: vehicleguard123

      - name: Upload rates-service test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rates-service-test-results
          path: rates-service/target/surefire-reports/

  build-risk-engine:
    name: Build & Test risk-engine
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vehicleguard_test
          POSTGRES_USER: vehicleguard
          POSTGRES_PASSWORD: vehicleguard123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build risk-engine
        working-directory: risk-engine
        run: mvn clean compile -B

      - name: Run unit tests - risk-engine
        working-directory: risk-engine
        run: mvn test -B -Dtest="RiskControllerTest,ChatControllerTest,RiskScoringServiceTest,AIExplanationServiceTest,ChatbotServiceTest"

      - name: Run integration tests - risk-engine
        working-directory: risk-engine
        run: mvn test -B -Dtest="RiskAssessmentIntegrationTest,ChatbotIntegrationTest"
        env:
          ANTHROPIC_API_KEY: test-key
          DB_URL: jdbc:postgresql://localhost:5432/vehicleguard_test
          DB_USER: vehicleguard
          DB_PASSWORD: vehicleguard123

      - name: Upload risk-engine test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: risk-engine-test-results
          path: risk-engine/target/surefire-reports/

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [build-rates-service, build-risk-engine, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Package rates-service
        working-directory: rates-service
        run: mvn package -DskipTests -B

      - name: Package risk-engine
        working-directory: risk-engine
        run: mvn package -DskipTests -B

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend production
        working-directory: frontend
        run: npm install && npm run build

      - name: Build Docker image - rates-service
        run: docker build -t vehicleguard/rates-service:latest ./rates-service

      - name: Build Docker image - risk-engine
        run: docker build -t vehicleguard/risk-engine:latest ./risk-engine

      - name: Build Docker image - frontend
        run: docker build -t vehicleguard/frontend:latest ./frontend

      - name: Report build status
        run: echo "All Docker images built successfully"
