server:
  port: 8081

spring:
  application:
    name: rates-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vehicleguard}
    username: ${DB_USER:vehicleguard}
    password: ${DB_PASSWORD:vehicleguard123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: risk_rules
        format_sql: true

  flyway:
    enabled: true
    schemas: risk_rules
    table: flyway_schema_history_rates
    default-schema: risk_rules
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.vehicleguard: INFO
    org.hibernate.SQL: WARN
