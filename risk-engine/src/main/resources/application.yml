server:
  port: 8080

spring:
  application:
    name: risk-engine

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vehicleguard}
    username: ${DB_USER:vehicleguard}
    password: ${DB_PASSWORD:vehicleguard123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: risk_rules
        format_sql: true

  flyway:
    enabled: true
    schemas: risk_rules, quotes
    table: flyway_schema_history_risk
    default-schema: risk_rules
    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  api-url: https://api.anthropic.com/v1
  model: claude-sonnet-4-5-20250929

rates:
  service:
    url: ${RATES_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.vehicleguard: INFO
    org.hibernate.SQL: WARN
